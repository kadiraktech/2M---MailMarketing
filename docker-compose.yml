
services:
  postgres:
    image: postgres:16-alpine
    container_name: mailmarketing-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mailmarketing}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mailmarketing}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mailmarketing-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=mailmarketing;Username=postgres;Password=postgres"
      Jwt__Issuer: ${JWT_ISSUER:-MailMarketingApi}
      Jwt__Audience: ${JWT_AUDIENCE:-MailMarketingFrontend}
      Jwt__SecretKey: ${JWT_SECRET_KEY:-DEV_SECRET_CHANGE_ME_12345678901234567890}
      APP_AES_KEY: ${APP_AES_KEY}
    ports:
      - "5000:5000"

  redis:
    image: redis:7
    container_name: mailmarketing-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mailmarketing-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  sonarqube:
    image: sonarqube:community
    container_name: mailmarketing-sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

  frontend:
    build:
      context: ./frontend/mail-marketing-ui
      dockerfile: ./Dockerfile
    container_name: mailmarketing-frontend
    depends_on:
      - backend
    ports:
      - "4200:4200"

volumes:
  postgres_data_v2:
